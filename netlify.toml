# Netlify config for Growth Unltd.
# Clean URLs: /cases instead of /cases.html, /team instead of /team.html, etc.

[build]
  publish = "."

# Strip .html from URLs (pretty URLs)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/how-we-work.html"
  to = "/how-we-work"
  status = 301
  force = true

[[redirects]]
  from = "/cases.html"
  to = "/cases"
  status = 301
  force = true

[[redirects]]
  from = "/team.html"
  to = "/team"
  status = 301
  force = true

[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301
  force = true

[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301
  force = true

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/context.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=3600"
